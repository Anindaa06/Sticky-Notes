<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sticky Notes</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    color: #333;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px;
    margin: 0;
    transition: 0.3s;
  }

  body.dark {
    background: #1e1e1e;
    color: #f5f5f5;
  }

  .top-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 30px;
  }

  #noteInput {
    width: 300px;
    padding: 12px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
    transition: 0.3s;
  }

  body.dark #noteInput {
    background: #333;
    color: white;
    border: 1px solid #555;
  }

  #noteInput:focus {
    border-color: #555;
  }

  button {
    padding: 12px 16px;
    font-size: 14px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
  }

  #resetBtn {
    background: #ff5c5c;
    color: white;
  }

  #resetBtn:hover {
    background: #e04848;
  }

  #darkModeBtn {
    background: #333;
    color: white;
  }

  body.dark #darkModeBtn {
    background: #f5f5f5;
    color: #333;
  }

  #notesContainer {
    width: 420px;
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  .note {
    padding: 20px;
    border-radius: 10px;
    font-weight: 500;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    word-wrap: break-word;
    position: relative;
    transition: 0.3s;
  }

  body.dark .note {
    color: #111;
  }

  .deleteBtn {
    position: absolute;
    top: 8px;
    right: 10px;
    background: transparent;
    border: none;
    font-size: 16px;
    cursor: pointer;
  }

</style>
</head>

<body>

<div class="top-bar">
  <input type="text" id="noteInput" placeholder="Type notes">
  <button id="darkModeBtn">Dark</button>
  <button id="resetBtn">Reset</button>
</div>

<div id="notesContainer"></div>

<script>
document.addEventListener("DOMContentLoaded", function() {

  const input = document.getElementById("noteInput");
  const container = document.getElementById("notesContainer");
  const resetBtn = document.getElementById("resetBtn");
  const darkModeBtn = document.getElementById("darkModeBtn");

  function getRandomColor() {
    const colors = [
      "#FFADAD",
      "#FFD6A5",
      "#FDFFB6",
      "#CAFFBF",
      "#9BF6FF",
      "#A0C4FF",
      "#BDB2FF",
      "#FFC6FF"
    ];
    return colors[Math.floor(Math.random() * colors.length)];
  }

  // Add note
  input.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
      const text = input.value.trim();
      if (text !== "") {

        const note = document.createElement("div");
        note.className = "note";
        note.style.backgroundColor = getRandomColor();

        const noteText = document.createElement("span");
        noteText.textContent = text;

        const deleteBtn = document.createElement("button");
        deleteBtn.innerHTML = "🗑";
        deleteBtn.className = "deleteBtn";

        deleteBtn.addEventListener("click", function() {
          note.remove();
        });

        note.appendChild(noteText);
        note.appendChild(deleteBtn);

        // Latest note on top
        container.prepend(note);

        input.value = "";
      }
    }
  });

  // Reset all notes
  resetBtn.addEventListener("click", function() {
    container.innerHTML = "";
  });

  // Dark mode toggle
  darkModeBtn.addEventListener("click", function() {
    document.body.classList.toggle("dark");
    
    if (document.body.classList.contains("dark")) {
      darkModeBtn.textContent = "Light";
    } else {
      darkModeBtn.textContent = "Dark";
    }
  });

});
</script>

</body>
</html>
